<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/Kan-bonim-booking-flow/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>הנגריה הפתוחה - הזמנת סדנה</title>
    <meta name="description" content="הזמנת סדנת נגרות בהנגריה הפתוחה" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages 404 handler - redirect to index.html for HashRouter
      // Only redirect if we're not already on index.html
      if (window.location.pathname !== '/Kan-bonim-booking-flow/' && 
          window.location.pathname !== '/Kan-bonim-booking-flow/index.html') {
        var path = window.location.pathname.replace('/Kan-bonim-booking-flow', '') || '/';
        var search = window.location.search;
        var hash = window.location.hash || ('#' + path + search);
        window.location.replace('/Kan-bonim-booking-flow/index.html' + hash);
      }
    </script>
    <script type="module" src="/Kan-bonim-booking-flow/src/main.jsx"></script>
  </body>
</html>
